name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # Keep in sync with the version documented in README.md
          version: v1.7.1

      - name: Check formatting
        run: forge fmt --check

      - name: Build src and check contract sizes (EIP-170)
        run: forge build src --sizes

      - name: Run tests
        run: forge test
