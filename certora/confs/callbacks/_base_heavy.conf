{
    "packages": [
        "@openzeppelin=lib/openzeppelin-contracts",
        "@midnight=lib/midnight/src",
        "@oracles=src/oracles",
        "@gates=src/gates",
        "@factories=src/factories",
        "@callbacks=src/callbacks",
        "@policies=src/ratifiers/policies",
        "@ratifiers=src/ratifiers",
        "@vault-v2=lib/vault-v2/src",
        "forge-std=lib/forge-std/src",
        "@morphoBlue=certora/harnesses/morpho-blue/src",
        "@bundler3=lib/bundler3/src"
    ],
    "parametric_contracts": [
        "MidnightHarness"
    ],
    "method": "take",
    "loop_iter": "2",
    "optimistic_loop": true,
    "optimistic_hashing": true,
    "hashing_length_bound": "2048",
    "prover_args": [
        "-disableInputSizeValidation true",
        "-depth 12",
        "-smt_initialSplitDepth 5",
        "-mediumTimeout 180",
        "-splitParallel",
        "true",
        "-dontStopAtFirstSplitTimeout",
        "true",
        "-s",
        "[z3:def{randomSeed=1},z3:def{randomSeed=2},z3:def{randomSeed=3},z3:def{randomSeed=4},z3:def{randomSeed=5},z3:def{randomSeed=6},z3:def{randomSeed=7},z3:def{randomSeed=8},z3:def{randomSeed=9},z3:def{randomSeed=10},z3:def{randomSeed=11},z3:def{randomSeed=12},cvc5:def,cvc5:def{randomSeed=2},cvc5:def{randomSeed=3},cvc5:def{randomSeed=4},yices:def,yices:def{randomSeed=2},bitwuzla:def,bitwuzla:def{randomSeed=2}]"
    ]
}
